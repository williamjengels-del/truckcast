<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline — VendCast</title>
<meta name="theme-color" content="#f97316">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0a0a0a; color: #f5f5f5; }
    .card { border-color: #27272a; }
    .hint { color: #a1a1aa; }
  }
  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 32px 24px;
  }
  .logo { font-size: 40px; line-height: 1; margin-bottom: 16px; }
  h1 { margin: 0 0 8px; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  p { margin: 0; font-size: 14px; line-height: 1.5; }
  .hint { color: #6b7280; margin-top: 12px; font-size: 13px; }
  .retry {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #f97316;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .retry:hover { background: #ea580c; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🚚</div>
    <h1>You're offline</h1>
    <p>VendCast needs a connection to load your events and forecasts.</p>
    <p class="hint">Reconnect and this page will reload automatically.</p>
    <button class="retry" onclick="location.reload()">Try again</button>
  </div>
  <script>
    // Auto-retry when connection comes back
    window.addEventListener("online", () => location.reload());
  </script>
</body>
</html>
